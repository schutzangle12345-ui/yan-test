    <style>
        :root {
            --color-primary: #0058a3;
            --color-primary-dark: #004a8a;
            --color-accent: #ffcc00;
            --color-background: #fcfcfc;
            --color-surface: #ffffff;
            --color-text: #1a1a1a;
            --color-text-muted: #666666;
            --color-border: #e5e5e5;
            --font-sans: 'Inter', sans-serif;
            --radius-large: 32px;
            --radius-medium: 12px;
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--color-background);
            color: var(--color-text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navigation */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
            gap: 12px;
        }

        .logo img {
            height: 40px;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--color-text);
            font-weight: 400;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .nav-links a:hover {
            color: var(--color-primary);
        }

        .cta-nav {
            background: var(--color-primary);
            color: white !important;
            padding: 0.75rem 2rem;
            border-radius: var(--radius-large);
            font-weight: 600 !important;
        }

        .cta-nav:hover {
            background: var(--color-primary-dark);
        }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
        }

        .auth-container {
            width: 100%;
            max-width: 480px;
            background: var(--color-surface);
            padding: 3rem;
            border-radius: var(--radius-large);
            border: 1px solid var(--color-border);
            text-align: center;
        }

        .auth-logo {
            margin-bottom: 2rem;
        }

        h1 {
            font-weight: 200;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        h1 i {
            font-style: italic;
        }

        .subtitle {
            color: var(--color-text-muted);
            margin-bottom: 2.5rem;
            font-size: 1rem;
        }

        /* Tabs */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--color-border);
            margin-bottom: 2.5rem;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            padding: 1rem;
            font-family: var(--font-sans);
            font-size: 0.95rem;
            color: var(--color-text-muted);
            cursor: pointer;
            position: relative;
            transition: var(--transition);
        }

        .tab-btn.active {
            color: var(--color-primary);
            font-weight: 600;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--color-primary);
        }

        /* Forms */
        .auth-form {
            text-align: left;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 1rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-medium);
            font-family: var(--font-sans);
            font-size: 1rem;
            transition: var(--transition);
            background: var(--color-background);
        }

        input:focus {
            outline: none;
            border-color: var(--color-primary);
            background: white;
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: var(--radius-large);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 1rem;
        }

        .submit-btn:hover {
            background: var(--color-primary-dark);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        #signup-tab-content, #signin-tab-content {
            display: none;
        }

        /* Footer */
        footer {
            padding: 4rem 2rem;
            background: var(--color-surface);
            border-top: 1px solid var(--color-border);
            text-align: center;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .footer-links a {
            text-decoration: none;
            color: var(--color-text-muted);
            font-size: 0.9rem;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .social-icons svg {
            width: 20px;
            height: 20px;
            fill: var(--color-text-muted);
            transition: var(--transition);
        }

        .social-icons a:hover svg {
            fill: var(--color-primary);
        }

        .copyright {
            font-size: 0.8rem;
            color: var(--color-text-muted);
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            .auth-container {
                padding: 2rem 1.5rem;
            }
            h1 {
                font-size: 2rem;
            }
        }
    </style>

    <script>
        function switchTab(tabId) {
            // Hide all contents
            document.querySelectorAll('.auth-tab-content').forEach(content => {
                content.style.display = 'none';
            });
            // Remove active class from buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            // Show target
            document.getElementById(tabId).style.display = 'block';
            document.querySelector(`[data-target="${tabId}"]`).classList.add('active');
        }

        // Auto-switch to Sign In after success
        (function() {
            const observer = new MutationObserver((mutations) => {
                mutations.forEach((mutation) => {
                    if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
                        const successMsg = mutation.target;
                        if (successMsg.style.display === 'block') {
                            setTimeout(() => {
                                switchTab('signin-tab-content');
                            }, 2000);
                        }
                    }
                });
            });

            const successMsg = document.querySelector('[data-success]');
            if (successMsg) {
                observer.observe(successMsg, { attributes: true });
            }
        })();
    </script>
